<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Vendor Booth Finder - Chatbot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: oklch(97% 0.008 85);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }
        
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 280px;
            background: linear-gradient(165deg, oklch(45% 0.15 25) 0%, oklch(35% 0.12 15) 100%);
            z-index: 0;
        }

        .container {
            background: oklch(99% 0.005 85);
            border-radius: 16px;
            box-shadow: 0 1px 3px oklch(0% 0 0 / 0.08), 0 24px 80px oklch(0% 0 0 / 0.12);
            width: 100%;
            max-width: 920px;
            height: 90vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            z-index: 1;
            border: 1px solid oklch(92% 0.008 85);
        }

        .header {
            background: oklch(99% 0.005 85);
            color: oklch(25% 0.015 15);
            padding: 48px 40px 32px;
            border-bottom: 2px solid oklch(45% 0.15 25);
            position: relative;
        }
        
        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 40px;
            right: 40px;
            height: 4px;
            background: linear-gradient(90deg, oklch(45% 0.15 25) 0%, oklch(55% 0.18 35) 50%, oklch(45% 0.15 25) 100%);
        }

        .header h1 {
            font-family: 'Space Grotesk', 'Inter', sans-serif;
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.02em;
            line-height: 1.2;
        }

        .header p {
            font-size: 15px;
            color: oklch(45% 0.02 15);
            font-weight: 500;
            letter-spacing: -0.01em;
        }

        .status {
            padding: 16px 40px;
            background: oklch(96% 0.008 85);
            border-bottom: 1px solid oklch(90% 0.01 85);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: -0.01em;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
            color: oklch(40% 0.02 15);
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: oklch(60% 0.05 15);
            border: 2px solid oklch(85% 0.01 15);
        }

        .status-dot.connected {
            background: oklch(55% 0.18 145);
            border-color: oklch(75% 0.12 145);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { 
                opacity: 1;
                transform: scale(1);
            }
            50% { 
                opacity: 0.7;
                transform: scale(1.1);
            }
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 32px 40px;
            background: oklch(98% 0.006 85);
        }

        .message {
            margin-bottom: 24px;
            display: flex;
            gap: 16px;
            animation: slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(16px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            flex-shrink: 0;
            font-weight: 600;
        }

        .message.bot .message-avatar {
            background: linear-gradient(135deg, oklch(45% 0.15 25) 0%, oklch(55% 0.18 35) 100%);
            box-shadow: 0 2px 8px oklch(45% 0.15 25 / 0.25);
        }

        .message.user .message-avatar {
            background: oklch(88% 0.01 85);
            color: oklch(35% 0.02 15);
            border: 2px solid oklch(82% 0.015 85);
        }

        .message-content {
            max-width: 65%;
            padding: 16px 20px;
            border-radius: 12px;
            line-height: 1.6;
            font-size: 15px;
            font-weight: 500;
            letter-spacing: -0.01em;
        }

        .message.bot .message-content {
            background: oklch(99% 0.005 85);
            color: oklch(25% 0.015 15);
            border: 1.5px solid oklch(90% 0.01 85);
            box-shadow: 0 1px 3px oklch(0% 0 0 / 0.06);
        }

        .message.user .message-content {
            background: oklch(45% 0.15 25);
            color: oklch(99% 0.005 85);
            border: 1.5px solid oklch(40% 0.14 20);
            box-shadow: 0 2px 8px oklch(45% 0.15 25 / 0.2);
        }

        .typing-indicator {
            display: none;
            padding: 16px 20px;
            background: oklch(99% 0.005 85);
            border: 1.5px solid oklch(90% 0.01 85);
            border-radius: 12px;
            width: fit-content;
        }

        .typing-indicator.active {
            display: block;
        }

        .typing-indicator span {
            display: inline-block;
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: oklch(45% 0.15 25);
            margin: 0 3px;
            animation: typing 1.4s ease-in-out infinite;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% { 
                transform: translateY(0);
                opacity: 0.4;
            }
            30% { 
                transform: translateY(-12px);
                opacity: 1;
            }
        }

        .input-container {
            padding: 24px 40px 32px;
            background: oklch(99% 0.005 85);
            border-top: 1px solid oklch(90% 0.01 85);
            display: flex;
            gap: 12px;
            position: sticky;
            bottom: 0;
            z-index: 10;
        }

        .input-wrapper {
            flex: 1;
            position: relative;
        }

        #messageInput {
            width: 100%;
            padding: 16px 20px;
            border: 2px solid oklch(88% 0.01 85);
            border-radius: 12px;
            font-size: 15px;
            font-weight: 500;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
            background: oklch(99% 0.005 85);
            color: oklch(25% 0.015 15);
            letter-spacing: -0.01em;
        }

        #messageInput::placeholder {
            color: oklch(65% 0.01 15);
        }

        #messageInput:focus {
            border-color: oklch(45% 0.15 25);
            box-shadow: 0 0 0 3px oklch(45% 0.15 25 / 0.1);
        }

        #sendButton {
            padding: 16px 32px;
            background: oklch(45% 0.15 25);
            color: oklch(99% 0.005 85);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            letter-spacing: -0.01em;
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 2px 8px oklch(45% 0.15 25 / 0.25);
        }

        #sendButton:hover:not(:disabled) {
            background: oklch(50% 0.16 30);
            transform: translateY(-1px);
            box-shadow: 0 4px 16px oklch(45% 0.15 25 / 0.35);
        }

        #sendButton:active:not(:disabled) {
            transform: translateY(0);
        }

        #sendButton:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }

        .quick-actions {
            padding: 16px 40px 0;
            background: oklch(99% 0.005 85);
            border-top: 1px solid oklch(90% 0.01 85);
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            position: sticky;
            bottom: 0;
            z-index: 10;
        }

        .quick-action-btn {
            padding: 10px 18px;
            background: oklch(96% 0.008 85);
            border: 1.5px solid oklch(88% 0.01 85);
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
            color: oklch(35% 0.02 15);
            letter-spacing: -0.01em;
        }

        .quick-action-btn:hover {
            background: oklch(45% 0.15 25);
            color: oklch(99% 0.005 85);
            border-color: oklch(40% 0.14 20);
            transform: translateY(-1px);
            box-shadow: 0 2px 8px oklch(45% 0.15 25 / 0.2);
        }

        .quick-action-btn:active {
            transform: translateY(0);
        }

        .error-message {
            background: oklch(95% 0.05 25);
            color: oklch(35% 0.08 25);
            padding: 16px 20px;
            border-radius: 12px;
            margin: 16px 40px;
            font-size: 14px;
            font-weight: 600;
            border: 1.5px solid oklch(85% 0.06 25);
            display: none;
            letter-spacing: -0.01em;
        }

        .error-message.show {
            display: block;
            animation: slideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Scrollbar styling */
        .chat-container::-webkit-scrollbar {
            width: 8px;
        }

        .chat-container::-webkit-scrollbar-track {
            background: oklch(96% 0.008 85);
        }

        .chat-container::-webkit-scrollbar-thumb {
            background: oklch(45% 0.15 25);
            border-radius: 4px;
        }
        
        .chat-container::-webkit-scrollbar-thumb:hover {
            background: oklch(50% 0.16 30);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🍔 Vendor Booth Matchmaker</h1>
            <p>AI-powered event matching for food vendors</p>
        </div>

        <div class="status">
            <div class="status-indicator">
                <div class="status-dot" id="statusDot"></div>
                <span id="statusText">Connecting...</span>
            </div>
            <span id="boothCount">Loading booths...</span>
        </div>

        <div class="error-message" id="errorMessage"></div>

        <div class="chat-container" id="chatContainer">
            <div class="message bot">
                <div class="message-avatar">🤖</div>
                <div class="message-content">
                    Hello! I'm your vendor matching assistant. I can help you find the perfect event opportunities for food vendors. Ask me about available events, pricing, locations, or specific requirements.
                </div>
            </div>
        </div>

        <div class="quick-actions">
            <button class="quick-action-btn" onclick="sendQuickMessage('What events are available this month?')">
                📋 Available Events
            </button>
            <button class="quick-action-btn" onclick="sendQuickMessage('Show me events under 3M budget')">
                💰 Budget Options
            </button>
            <button class="quick-action-btn" onclick="sendQuickMessage('I need weekend events in Jakarta')">
                📍 Jakarta Events
            </button>
            <button class="quick-action-btn" onclick="sendQuickMessage('What features do events offer?')">
                ⚡ Event Features
            </button>
        </div>

        <div class="input-container">
            <div class="input-wrapper">
                <input 
                    type="text" 
                    id="messageInput" 
                    placeholder="Ask about events, vendors, or requirements..."
                    onkeypress="handleKeyPress(event)"
                >
            </div>
            <button id="sendButton" onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:5000/api';
        let conversationHistory = [];
        let isConnected = false;

        // Check API connection on load
        async function checkConnection() {
            try {
                const response = await fetch(`${API_URL}/health`);
                const data = await response.json();
                
                if (data.status === 'healthy') {
                    isConnected = true;
                    document.getElementById('statusDot').classList.add('connected');
                    document.getElementById('statusText').textContent = 'Connected';
                    loadBoothCount();
                } else {
                    showError('API is not healthy');
                }
            } catch (error) {
                showError('Cannot connect to API. Make sure the server is running on http://localhost:5000');
                document.getElementById('statusText').textContent = 'Disconnected';
            }
        }

        // Load booth count
        async function loadBoothCount() {
            try {
                const response = await fetch(`${API_URL}/events/all`);
                const data = await response.json();
                document.getElementById('boothCount').textContent = `${data.total || 0} events available`;
            } catch (error) {
                document.getElementById('boothCount').textContent = 'Unable to load events';
            }
        }

        // Send message
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            
            if (!message) return;
            
            if (!isConnected) {
                showError('Not connected to API. Please start the server.');
                return;
            }

            // Clear input
            input.value = '';
            
            // Add user message to chat
            addMessage(message, 'user');
            
            // Show typing indicator
            showTypingIndicator();
            
            // Disable send button
            document.getElementById('sendButton').disabled = true;

            try {
                const response = await fetch(`${API_URL}/chat`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        message: message,
                        conversation_history: conversationHistory
                    })
                });

                const data = await response.json();
                
                // Hide typing indicator
                hideTypingIndicator();
                
                if (data.success) {
                    // Add bot response
                    addMessage(data.response, 'bot');
                    
                    // Update conversation history
                    conversationHistory.push({
                        role: 'user',
                        content: message
                    });
                    conversationHistory.push({
                        role: 'assistant',
                        content: data.response
                    });
                    
                    // Keep only last 10 messages
                    if (conversationHistory.length > 10) {
                        conversationHistory = conversationHistory.slice(-10);
                    }
                } else {
                    showError(data.error || 'Failed to get response');
                    addMessage('Sorry, I encountered an error. Please try again.', 'bot');
                }
            } catch (error) {
                hideTypingIndicator();
                showError('Network error: ' + error.message);
                addMessage('Sorry, I had trouble connecting. Please make sure the API server is running.', 'bot');
            } finally {
                document.getElementById('sendButton').disabled = false;
            }
        }

        // Add message to chat
        function addMessage(text, sender) {
            const chatContainer = document.getElementById('chatContainer');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;
            
            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.textContent = sender === 'bot' ? '🤖' : '👤';
            
            const content = document.createElement('div');
            content.className = 'message-content';
            content.textContent = text;
            
            messageDiv.appendChild(avatar);
            messageDiv.appendChild(content);
            chatContainer.appendChild(messageDiv);
            
            // Scroll to bottom
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // Show typing indicator
        function showTypingIndicator() {
            const chatContainer = document.getElementById('chatContainer');
            const typingDiv = document.createElement('div');
            typingDiv.id = 'typingIndicator';
            typingDiv.className = 'message bot';
            typingDiv.innerHTML = `
                <div class="message-avatar">🤖</div>
                <div class="typing-indicator active">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            `;
            chatContainer.appendChild(typingDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // Hide typing indicator
        function hideTypingIndicator() {
            const typingIndicator = document.getElementById('typingIndicator');
            if (typingIndicator) {
                typingIndicator.remove();
            }
        }

        // Show error message
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.classList.add('show');
            setTimeout(() => {
                errorDiv.classList.remove('show');
            }, 5000);
        }

        // Handle Enter key
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        // Send quick message
        function sendQuickMessage(message) {
            document.getElementById('messageInput').value = message;
            sendMessage();
        }

        // Initialize
        checkConnection();
    </script>
</body>
</html>
